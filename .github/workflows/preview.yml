name: PR preview (DigitalOcean App Platform)

# Spins up an ephemeral DO App Platform app for each PR into release/next, comments
# the live URL on the PR, and tears the app down when the PR closes. Built from the
# spec in .do/app.yaml via digitalocean/app_action. One-time setup (DO token +
# DIGITALOCEAN_ACCESS_TOKEN secret + GitHub<->App Platform auth) is in
# docs/preview-deploys.md.
#
# Note: forked PRs don't get the DIGITALOCEAN_ACCESS_TOKEN secret, so their deploy
# step fails by design — previews only run for branches pushed to this repo.

on:
  pull_request:
    branches: [release/next]
    types: [opened, synchronize, reopened, closed]

# One deploy per PR at a time; a new push supersedes the in-flight run. A close event
# shares the group, so it cancels any in-flight deploy before tearing the app down.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy preview app
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          deploy_pr_preview: "true"

      - name: Comment the preview URL
        if: success()
        uses: actions/github-script@v7
        env:
          LIVE_URL: ${{ fromJson(steps.deploy.outputs.app).live_url }}
        with:
          script: |
            const marker = '<!-- do-pr-preview -->';
            const body = `${marker}\n:rocket: **Preview deployed:** ${process.env.LIVE_URL}\n\n_Ephemeral App Platform app — torn down automatically when this PR closes._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          BUILD_LOGS: ${{ steps.deploy.outputs.build_logs }}
          DEPLOY_LOGS: ${{ steps.deploy.outputs.deploy_logs }}
        with:
          script: |
            const run = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `:x: **Preview deploy failed** — [workflow logs](${run}).`,
              '',
              '<details><summary>Build logs</summary>',
              '',
              '```',
              process.env.BUILD_LOGS || '(none)',
              '```',
              '</details>',
              '<details><summary>Deploy logs</summary>',
              '',
              '```',
              process.env.DEPLOY_LOGS || '(none)',
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });

  cleanup:
    name: Delete preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview app
        uses: digitalocean/app_action/delete@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          from_pr_preview: "true"
          ignore_not_found: "true"
