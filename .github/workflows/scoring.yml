name: Scoring

# Periodic matching/scoring, on its OWN schedule, separate from the daily scrape.
# Scoring is the expensive per-user LLM step; it was taken off the daily cron and off
# Vercel (serverless threads die on a function freeze), so this standalone GitHub
# Actions run is the reliable place to drain everyone's matching backlog. `jobscout
# run-scoring` enqueues every user with pending work and drains the queue with a
# bounded worker pool (JOBSCOUT_SCORING_MAX_CONCURRENCY), so concurrent Supabase
# connections stay capped no matter how many users have work — the whole reason for
# the queue (see app/services/scoring_queue.py).
on:
  schedule:
    - cron: "0 */4 * * *" # every 4h (GitHub cron is always UTC); tune as needed
  workflow_dispatch: # manual "Run workflow" button

concurrency:
  group: scoring
  cancel-in-progress: false # never kill an in-progress drain (and never stack to 2N connections)

jobs:
  score:
    name: Run scoring drain
    runs-on: ubuntu-latest
    timeout-minutes: 60 # JOBSCOUT_SCORING_RUN_BUDGET_SECONDS stops the drain before this
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Run scoring drain
        # JOBSCOUT_SECRET_KEY is REQUIRED here (unlike the scrape-only daily run): scoring
        # decrypts each user's LLM API key (llm_configs.api_key, encrypted at rest) to call
        # their provider. Same value Vercel runs with.
        env:
          JOBSCOUT_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          JOBSCOUT_SECRET_KEY: ${{ secrets.JOBSCOUT_SECRET_KEY }}
        run: jobscout run-scoring
