name: Deploy to production (Supabase + Vercel)

# Runs on every push to main, and on demand from the Actions tab.
# Flow: test -> migrate (Supabase schema) -> deploy (Vercel). Each stage gates
# the next, so a failing test or migration never ships.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; cancel an in-flight older run.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q

  migrate:
    name: Migrate Supabase schema
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Apply schema (jobscout init-db)
        # create_all + preset seed: additive and idempotent, safe on every deploy.
        # Prod starts as a brand-new, empty DB — no local data is copied to it.
        # init-db doesn't use the secret key, so it isn't needed here (it lives only
        # in Vercel as the app's runtime JOBSCOUT_SECRET_KEY).
        env:
          JOBSCOUT_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: jobscout init-db

  deploy:
    name: Deploy to Vercel
    needs: migrate
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy (prebuilt)
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
