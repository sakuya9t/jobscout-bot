name: Deploy to production (Supabase + Vercel)

# Runs on every push to main, and on demand from the Actions tab.
# Flow: test -> migrate (Supabase schema) -> deploy (Vercel). Each stage gates
# the next, so a failing test or migration never ships.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; cancel an in-flight older run.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e '.[dev]'
      - name: Run tests
        # Skip the live-network smoke tests so the deploy gate can't flake on a
        # third-party board being down (same as ci.yml).
        env:
          JOBSCOUT_SKIP_NET: "1"
        run: pytest -q

  migrate:
    name: Migrate Supabase schema
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Apply schema (jobscout init-db)
        # create_all + preset seed: additive and idempotent, safe on every deploy.
        # Prod starts as a brand-new, empty DB — no local data is copied to it.
        env:
          JOBSCOUT_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: jobscout init-db
      - name: Encrypt credential columns at rest (idempotent)
        # Widens + Fernet-encrypts users.telegram_bot_token and llm_configs.api_key.
        # Needs JOBSCOUT_SECRET_KEY — and it MUST match the value Vercel runs with,
        # or the app can't decrypt what this writes. No-op once everything is encrypted.
        env:
          JOBSCOUT_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          JOBSCOUT_SECRET_KEY: ${{ secrets.JOBSCOUT_SECRET_KEY }}
        run: jobscout encrypt-secrets

  deploy:
    name: Deploy to Vercel
    needs: migrate
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to production
        # Vercel builds remotely — its build image has uv + the full Python
        # toolchain. We deliberately do NOT run `vercel build` in CI (the prebuilt
        # flow), because that requires uv on the runner. The VERCEL_ORG_ID/
        # VERCEL_PROJECT_ID env vars identify the project (no `vercel pull` needed).
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
