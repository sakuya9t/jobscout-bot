name: Daily scan

# The daily scrape. It runs here, NOT as a Vercel Cron, because Vercel Hobby caps
# functions at 60s; a GitHub Actions runner has no such limit, so `jobscout
# run-daily` can scrape every company to completion. It only scrapes and saves new
# positions — matching (the expensive per-user LLM step) is deferred to an on-demand
# scan from the dashboard, so this stays fast and cheap even with many users.
on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily (GitHub cron is always UTC)
  workflow_dispatch: # manual "Run workflow" button

concurrency:
  group: daily-scan
  cancel-in-progress: false # never kill an in-progress scan

jobs:
  scan:
    name: Run daily scan
    runs-on: ubuntu-latest
    timeout-minutes: 60 # safety cap; a normal run takes minutes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Run daily scan
        # The DB URL is REQUIRED. JOBSCOUT_SECRET_KEY is kept here (same value Vercel
        # runs with) so any encrypted-at-rest column this path touches decrypts
        # correctly; scrape-only doesn't score or send Telegram, but keeping the key
        # aligned avoids surprises if the scrape path ever reads a secret column.
        #
        # After scraping, run-daily enqueues users with new backlog and fires the
        # scoring trigger (repository_dispatch -> the Scoring workflow) so fresh
        # postings start scoring promptly instead of waiting for the scoring schedule.
        # GH_DISPATCH_TOKEN = PAT / GitHub App token with `actions: write` (the default
        # GITHUB_TOKEN can't trigger another workflow); omit to fall back to schedule.
        env:
          JOBSCOUT_DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          JOBSCOUT_SECRET_KEY: ${{ secrets.JOBSCOUT_SECRET_KEY }}
          JOBSCOUT_SCORING_DISPATCH_URL: https://api.github.com/repos/${{ github.repository }}/dispatches
          JOBSCOUT_SCORING_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: jobscout run-daily
