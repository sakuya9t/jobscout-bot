name: CI

# Test gate for pull requests (and pushes to the integration branches). A PR must
# pass this before it can be merged — enable the two jobs below as *required status
# checks* in the branch-protection rule for `main` (and `release/next`); see
# docs/ci.md. The runner matches the DigitalOcean App Platform runtime (Python 3.11,
# from .python-version / the Procfile), so a green run verifies the same code DO
# deploys against both the editable install and DO's exact requirements.txt set.

on:
  pull_request:
  push:
    branches: [main, release/next]

# One in-flight run per ref; a new push cancels the previous run to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Skip the live-network smoke tests (real career boards). CI must never depend on
  # third-party sites being reachable; every unit + e2e test mocks the network/LLM.
  JOBSCOUT_SKIP_NET: "1"

jobs:
  test:
    name: Unit + e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # matches .python-version / the Procfile (DO runtime)
          cache: pip
      - name: Install (runtime + dev/test deps)
        run: pip install -e '.[dev]'
      - name: Run unit + e2e tests
        run: pytest -q

  do-build-parity:
    name: DigitalOcean build parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install exactly what DigitalOcean installs (requirements.txt)
        # DO's Python buildpack installs from requirements.txt, NOT pyproject. Running
        # the suite against that exact runtime set (plus pytest) verifies the tests for
        # the DO deployment and catches requirements.txt / pyproject drift.
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Boot the app the way DO starts it (Procfile entrypoint)
        # The Procfile runs `python -m app.cli serve`; `app` is found via the repo CWD,
        # no editable install — exactly the DO runtime. A failure here means DO would
        # fail to boot even if the deps installed.
        run: python -m app.cli --help
      - name: Run unit + e2e tests on the DO dependency set
        # PYTHONPATH=. so `app` resolves from the repo root (DO runs from there); we do
        # not `pip install -e .`, to keep the dependency set identical to DO's.
        run: PYTHONPATH="$PWD" pytest -q

  spa-build:
    name: SPA build freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The Vue/Vite SPA builds into app/static, which is COMMITTED so DO's Python
      # buildpack (no Node step) ships it as-is. Rebuild here and fail if the committed
      # assets are stale relative to frontend/src — this is what keeps them honest.
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Build SPA
        run: cd frontend && npm run build
      - name: Fail if committed app/static is stale
        run: |
          if ! git diff --exit-code -- app/static; then
            echo "::error::app/static is out of date. Run 'cd frontend && npm run build' and commit the result."
            exit 1
          fi
