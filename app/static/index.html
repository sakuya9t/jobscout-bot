<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JobScout</title>
  <!-- Theme bootstrap (pre-paint, lifted verbatim from app/templates/base.html) so the
       data-theme attribute is set before Vue mounts — no flash of the wrong theme. -->
  <script>
    (() => {
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      let theme = prefersDark ? "dark" : "light";
      try { theme = localStorage.getItem("theme") || localStorage.getItem("jobscout-theme") || theme; } catch (e) {}
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/static/assets/index-CSSUfmeb.js"></script>
  <link rel="stylesheet" crossorigin href="/static/assets/index-B4LDNDZy.css">
</head>
<body>
  <div id="app"></div>
</body>
</html>
