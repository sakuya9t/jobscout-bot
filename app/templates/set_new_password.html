{% extends "base.html" %}
{% block title %}Set a new password · JobScout{% endblock %}
{% block body %}
<style>
  .auth-page {
    min-height:calc(100vh - 64px); display:grid; place-items:center;
    padding:32px 16px;
  }
  .auth-card { width:min(100%, 400px); padding:32px; }
  .auth-card h1 { margin-bottom:4px; }
  .auth-subtitle { margin:0 0 22px; color:var(--text-secondary); font-size:13px; }
  .auth-actions { margin-top:18px; }
  .auth-actions button { width:100%; }
  .auth-header-actions { display:flex; align-items:center; gap:12px; }
  header .brand:hover { text-decoration:none; }
</style>
<header>
  <a class="brand" href="/" aria-label="Go to JobScout landing page">JobScout</a>
  <div class="auth-header-actions">
    <button class="theme-toggle" type="button" aria-label="Toggle color theme" onclick="toggleTheme()">
      <span class="sun">☀</span><span class="moon">☾</span>
    </button>
  </div>
</header>
<main class="auth-page">
  <div class="card auth-card">
    <h1>Set a new password</h1>
    <p class="auth-subtitle">
      You signed in with a temporary password. Choose a new one to finish.
    </p>
    <label for="password">New password</label>
    <input id="password" type="password" autocomplete="new-password" />
    <p class="muted" style="margin:6px 0 0;">
      At least 8 characters, including a letter and a number.
    </p>
    <p class="err" id="err"></p>
    <div class="auth-actions">
      <button id="submit">Save and continue</button>
    </div>
  </div>
</main>
<script>
  // FastAPI returns `detail` as a string for raised HTTPExceptions but as an array of
  // {loc, msg, ...} objects for 422 validation errors (e.g. the complexity rule) —
  // normalize both (mirrors login.html).
  const errorText = (detail) => {
    if (typeof detail === "string") return detail;
    if (Array.isArray(detail)) return detail.map((e) => e.msg).filter(Boolean).join("; ");
    return "";
  };
  const submit = document.getElementById("submit");
  submit.onclick = async () => {
    const err = document.getElementById("err");
    err.textContent = "";
    submit.disabled = true;
    try {
      const r = await fetch("/api/auth/set-new-password", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ new_password: document.getElementById("password").value }),
      });
      if (r.ok) { window.location = "/"; return; }
      // No valid session (e.g. opened this page directly) — send them to log in.
      if (r.status === 401) { window.location = "/login"; return; }
      const d = await r.json().catch(() => ({}));
      err.textContent = errorText(d.detail) || "Something went wrong";
    } finally {
      submit.disabled = false;
    }
  };
</script>
{% endblock %}
