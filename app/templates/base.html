<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}JobScout{% endblock %}</title>
  <style>
    :root { --bg:#0f1115; --card:#1a1d24; --fg:#e6e6e6; --muted:#9aa0aa;
            --accent:#5b9dff; --good:#3fb950; --warn:#d29922; --line:#2a2e37; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
           font:15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    a { color:var(--accent); text-decoration:none; }
    header { display:flex; justify-content:space-between; align-items:center;
             padding:14px 24px; border-bottom:1px solid var(--line); }
    header .brand { font-weight:700; font-size:18px; }
    main { max-width:980px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
            padding:18px; margin-bottom:18px; }
    h1 { font-size:22px; } h2 { font-size:17px; margin-top:0; }
    label { display:block; font-size:13px; color:var(--muted); margin:8px 0 3px; }
    input, textarea, select { width:100%; padding:9px 11px; background:#0d0f13;
            border:1px solid var(--line); border-radius:8px; color:var(--fg); font:inherit; }
    textarea { min-height:64px; resize:vertical; }
    button { background:var(--accent); color:#08111f; border:0; border-radius:8px;
             padding:9px 16px; font-weight:600; cursor:pointer; }
    button.ghost { background:transparent; color:var(--fg); border:1px solid var(--line); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .pill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px;
            background:#10243a; color:var(--accent); }
    .score { font-weight:700; color:var(--good); }
    .muted { color:var(--muted); font-size:13px; }
    .list-item { border-top:1px solid var(--line); padding:12px 0; }
    .list-item:first-child { border-top:0; }
    code { background:#0d0f13; padding:2px 6px; border-radius:6px; }
    .err { color:#f85149; font-size:13px; }
    .flex { display:flex; gap:8px; align-items:center; }
    ul.tight { margin:6px 0; padding-left:18px; }
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
