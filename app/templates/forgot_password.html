{% extends "base.html" %}
{% block title %}Forgot password · JobScout{% endblock %}
{% block body %}
<style>
  .auth-page {
    min-height:calc(100vh - 64px); display:grid; place-items:center;
    padding:32px 16px;
  }
  .auth-card { width:min(100%, 400px); padding:32px; }
  .auth-card h1 { margin-bottom:4px; }
  .auth-subtitle { margin:0 0 22px; color:var(--text-secondary); font-size:13px; }
  .auth-actions { margin-top:18px; }
  .auth-actions button { width:100%; }
  .auth-footer { margin:18px 0 0; color:var(--text-secondary); font-size:13px; }
  .auth-header-actions { display:flex; align-items:center; gap:12px; }
  .auth-ok { color:var(--text-success); font-size:13px; margin:12px 0 0; }
  header .brand:hover { text-decoration:none; }
</style>
<header>
  <a class="brand" href="/" aria-label="Go to JobScout landing page">JobScout</a>
  <div class="auth-header-actions">
    <button class="theme-toggle" type="button" aria-label="Toggle color theme" onclick="toggleTheme()">
      <span class="sun">☀</span><span class="moon">☾</span>
    </button>
  </div>
</header>
<main class="auth-page">
  <div class="card auth-card">
    <h1>Forgot password</h1>
    <p class="auth-subtitle">
      Enter your account email and we'll send a temporary password to your linked Telegram chat.
    </p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" />
    <p class="err" id="err"></p>
    <p class="auth-ok" id="ok" hidden></p>
    <div class="auth-actions">
      <button id="submit">Send temporary password</button>
    </div>
    <p class="auth-footer">
      Remembered it? <a href="/login">Back to log in</a>
    </p>
  </div>
</main>
<script>
  const TTL_MIN = {{ ttl }};
  const submit = document.getElementById("submit");
  submit.onclick = async () => {
    const err = document.getElementById("err");
    const ok = document.getElementById("ok");
    err.textContent = "";
    ok.hidden = true;
    submit.disabled = true;
    try {
      const r = await fetch("/api/auth/forgot-password", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: document.getElementById("email").value }),
      });
      if (r.ok) {
        // Deliberately generic: we never reveal whether the email is registered or has
        // Telegram linked, so this can't be used to enumerate accounts.
        ok.textContent =
          "If an account with that email has Telegram linked, a temporary password is on " +
          "its way. It expires in " + TTL_MIN + " minutes — log in with it to set a new one.";
        ok.hidden = false;
      } else {
        const d = await r.json().catch(() => ({}));
        err.textContent = (typeof d.detail === "string" ? d.detail : "") || "Something went wrong";
      }
    } finally {
      submit.disabled = false;
    }
  };
</script>
{% endblock %}
